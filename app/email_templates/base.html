<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; padding: 32px 16px; }
  .wrapper { max-width: 560px; margin: 0 auto; }
  .card { background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .header { background: #1e40af; padding: 28px 32px; }
  .header h1 { color: #ffffff; font-size: 20px; font-weight: 600; }
  .header p { color: #93c5fd; font-size: 13px; margin-top: 4px; }
  .body { padding: 32px; }
  .body h2 { font-size: 20px; color: #0f172a; margin-bottom: 8px; font-weight: 600; }
  .body p { font-size: 15px; color: #475569; line-height: 1.6; margin-bottom: 16px; }
  .badge { display: inline-block; padding: 6px 16px; border-radius: 999px; font-size: 13px; font-weight: 600; margin-bottom: 20px; }
  .badge.green { background: #dcfce7; color: #166534; }
  .badge.yellow { background: #fef9c3; color: #854d0e; }
  .badge.blue { background: #dbeafe; color: #1e40af; }
  .badge.red { background: #fee2e2; color: #991b1b; }
  .badge.purple { background: #ede9fe; color: #5b21b6; }
  .skills { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
  .skill { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 6px; padding: 4px 12px; font-size: 13px; color: #334155; }
  .skill.matched { background: #dcfce7; border-color: #bbf7d0; color: #166534; }
  .skill.missing { background: #fee2e2; border-color: #fecaca; color: #991b1b; }
  .btn { display: inline-block; padding: 12px 28px; background: #1e40af; color: #ffffff; border-radius: 10px; text-decoration: none; font-size: 15px; font-weight: 600; margin: 8px 0; }
  .divider { height: 1px; background: #f1f5f9; margin: 24px 0; }
  .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
  .info-row .label { color: #94a3b8; }
  .info-row .value { color: #0f172a; font-weight: 500; }
  .footer { background: #f8fafc; padding: 20px 32px; text-align: center; }
  .footer p { font-size: 12px; color: #94a3b8; }
  .footer a { color: #3b82f6; text-decoration: none; }
  .score-bar { background: #f1f5f9; border-radius: 999px; height: 8px; margin: 8px 0 20px; overflow: hidden; }
  .score-fill { height: 8px; border-radius: 999px; }
  .tip { background: #eff6ff; border-left: 3px solid #3b82f6; padding: 12px 16px; border-radius: 0 8px 8px 0; margin: 16px 0; font-size: 14px; color: #1e40af; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="card">
    <div class="header">
      <h1>CareerBridge AI</h1>
      <p>Your intelligent career partner</p>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>You received this email because you are registered on CareerBridge AI.</p>
      <p style="margin-top:6px"><a href="#">Unsubscribe</a> · <a href="#">Privacy Policy</a></p>
    </div>
  </div>
</div>
</body>
</html>
